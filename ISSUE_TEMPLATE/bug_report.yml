name: Bug Report
description: Report a bug in an OpenOctopus project.
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a bug! Please fill out the sections below.
  - type: input
    id: package
    attributes:
      label: Package / Component
      description: Which package or component is affected?
      placeholder: e.g. @openoctopus/ink, tentacle CLI, Pet Realm
    validations:
      required: true
  - type: textarea
    id: description
    attributes:
      label: Bug Description
      description: A clear description of what the bug is.
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: Steps to Reproduce
      description: Minimal steps to reproduce the behavior.
      value: |
        1.
        2.
        3.
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
      description: What did you expect to happen?
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual Behavior
      description: What actually happened?
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: Version
      description: Output of `tentacle --version` or package version.
      placeholder: e.g. 2026.3.10
    validations:
      required: false
  - type: dropdown
    id: os
    attributes:
      label: Operating System
      options:
        - macOS
        - Linux
        - Windows (WSL)
        - Docker
        - Other
    validations:
      required: false
  - type: textarea
    id: context
    attributes:
      label: Additional Context
      description: Logs, screenshots, config snippets, or anything else relevant.
    validations:
      required: false
